tags:
  - Contacts
summary: Update contact by id
operationId: updateContact
description: Update contact details by id
security:
  - bearerAuth: []
parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
      example: '65ca67e7ae7f10c88b598384'
requestBody:
  content:
    multipart/form-data:
      schema:
        type: object
        required:
          - name
          - phoneNumber
          - contactType
        properties:
          name:
            type: string
            description: Updated contact name
            minLength: 3
            maxLength: 20
            example: 'Maria Ivanova'
          phoneNumber:
            type: string
            description: Updated phone number
            example: 380671234567
          email:
            type: string
            format: email
            description: Updated email
            example: 'maria.ivanova@email.com'
          isFavourite:
            type: boolean
            description: Updated favorite status
            example: false
          contactType:
            type: string
            enum: ['work', 'home', 'personal']
            description: Updated contact type
          photo:
            type: string
            format: binary
            description: Image file to upload (optional)
  required: false
responses:
  '200':
    description: Contact updated
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully updated contact!
            data:
              $ref: '../../../components/schemas/contact.yaml'
  '401':
    $ref: '../../../components/responses/401.yaml'
